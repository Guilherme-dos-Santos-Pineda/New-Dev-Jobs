<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E14"/>
      <stop offset="1" stop-color="#11161F"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2B8AF0"/>
      <stop offset="1" stop-color="#0C447C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#1F6FEB" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#mark)"/>

  <!-- Logo -->
  <g transform="translate(96,96)">
    <rect width="72" height="72" rx="18" fill="url(#mark)"/>
    <path d="M16 26 h40 a4 4 0 0 1 4 4 v14 a4 4 0 0 1 -4 4 h-40 a4 4 0 0 1 -4 -4 v-14 a4 4 0 0 1 4 -4 z" fill="none" stroke="#FFFFFF" stroke-width="3.2"/>
    <path d="M13 29 l23 15 l23 -15" fill="none" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="188" y="145" font-family="'DejaVu Sans Mono','IBM Plex Mono',monospace" font-size="40" font-weight="700" fill="#F0F6FC" letter-spacing="-1">newdevjobs</text>

  <!-- Headline -->
  <text x="96" y="330" font-family="'DejaVu Sans','Inter',sans-serif" font-size="76" font-weight="800" fill="#F0F6FC" letter-spacing="-2">Candidaturas</text>
  <text x="96" y="418" font-family="'DejaVu Sans','Inter',sans-serif" font-size="76" font-weight="800" letter-spacing="-2"><tspan fill="#58A6FF">automáticas</tspan><tspan fill="#F0F6FC" dx="22">para devs</tspan></text>

  <!-- Sub -->
  <text x="98" y="486" font-family="'DejaVu Sans','Inter',sans-serif" font-size="30" font-weight="400" fill="#9DA7B3">Monitoramos vagas no LinkedIn e enviamos seu currículo</text>
  <text x="98" y="524" font-family="'DejaVu Sans','Inter',sans-serif" font-size="30" font-weight="400" fill="#9DA7B3">automaticamente — pela sua própria conta Gmail.</text>

  <!-- URL -->
  <text x="98" y="586" font-family="'DejaVu Sans Mono','IBM Plex Mono',monospace" font-size="26" font-weight="500" fill="#58A6FF">landing.newdevjobs.xyz</text>
</svg>
